<!DOCTYPE html>     <!-- An HTML document starts with the <!DOCTYPE html> tag which tells the web browser what version of HTML 
                    (in this case, HTML5) the page is written in, so the browser knows how to correctly interpret and render the page. -->
<html>              <!-- the <html> tag is a root element that wraps all HTML content on the page. -->
    <head>          <!-- the <head> tag contains metadata (helps browsers, search engines, and other tools understand the page). -->
        <title>     <!-- The <title> tag contains data/text that appears on the tab when the webpage opens on the browser. -->
            My First HTML Page 
        </title>
    </head>
    <body>                                                                     <!-- the <body> tag contains all visible content displayed on the webpage. -->
        <h1>Hello this is my first HTML page</h1>                              <!-- The <h1> tag contains data/text that appears as a heading in the HTML file. -->
        <p>This is my first HTML page</p>         <!-- the <p> tag contains the paragraph of the HTML file. -->
    </body>
</html>
