<DOCTYPE html>
    <html>
        <title>Anchor Tag That Opens Another Tab</title>
        <head>
            <h1>Anchor Tag That Opens Another Tab</h1>
        </head>
        <body>
            <a href="https://www.google.com" target="_blank"> <!-- the target="_blank" element redirects to the specified URL, but opens 
                                                                    it in a new tab -->
                Visit Google
            </a>
        </body>
    </html>
</DOCTYPE>
