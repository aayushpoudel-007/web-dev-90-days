<!DOCTYPE html>
<html>
    <title>
        Anchor Tag
    </title>
    <head>
        <h1>Anchor Tag</h1>
    </head>
    <body>
        <a href="https://www.google.com">       <!-- The Anchor tag <a> creates a clickable link which redirects the user to another webpage
                                                     href="" specifies the URL to be redirected to -->
        Visit Google                            <!-- The clickable text that can be clicked on for redirection in the webpage -->
        </a>
    </body>
</html>
